<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<meta name="description" content="A free markdown editor with live preview. Write, upload, download — no account needed.">
<title>MD Pad</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230f0f0f'/><text x='50' y='70' font-size='55' text-anchor='middle' fill='%2300d4aa' font-family='monospace' font-weight='bold'>M</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230f0f0f'/><text x='50' y='70' font-size='55' text-anchor='middle' fill='%2300d4aa' font-family='monospace' font-weight='bold'>M</text></svg>">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-2: #222;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #777;
    --accent: #00d4aa;
    --accent-dim: #00d4aa22;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-serif: 'Source Serif 4', 'Georgia', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
    user-select: none;
  }

  .filename-input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .filename-input:focus { border-color: var(--accent); }

  .actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn.primary:hover { opacity: 0.9; color: var(--bg); }

  .btn svg { width: 15px; height: 15px; }

  #file-input { display: none; }

  /* ── Main area ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Editor ── */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pane-header {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pane-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  #editor {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.7;
    tab-size: 2;
    overflow-y: auto;
  }
  #editor::placeholder { color: var(--text-muted); }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-track { background: transparent; }
  #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #editor::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ── Divider ── */
  .divider {
    width: 1px;
    background: var(--border);
    cursor: col-resize;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .divider:hover, .divider.active { background: var(--accent); }
  .divider::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: -4px; right: -4px;
  }

  /* ── Preview ── */
  .preview-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #preview {
    flex: 1;
    padding: 20px 28px;
    overflow-y: auto;
    background: var(--bg);
  }
  #preview::-webkit-scrollbar { width: 6px; }
  #preview::-webkit-scrollbar-track { background: transparent; }
  #preview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Markdown rendered styles ── */
  #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
    color: var(--text);
    margin-top: 1.4em;
    margin-bottom: 0.5em;
    line-height: 1.3;
  }
  #preview h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
  #preview h3 { font-size: 1.25em; }
  #preview h1:first-child, #preview h2:first-child, #preview h3:first-child { margin-top: 0; }

  #preview p { margin-bottom: 1em; line-height: 1.7; }

  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }

  #preview code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.88em;
    color: #ff9f43;
  }

  #preview pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 1em;
  }
  #preview pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 0.88em;
    line-height: 1.6;
  }

  #preview blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin: 1em 0;
    color: var(--text-muted);
    background: var(--accent-dim);
    border-radius: 0 6px 6px 0;
  }
  #preview blockquote p { margin-bottom: 0; }

  #preview ul, #preview ol { margin-bottom: 1em; padding-left: 1.5em; }
  #preview li { margin-bottom: 0.3em; line-height: 1.6; }

  #preview hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

  #preview img { max-width: 100%; border-radius: 8px; margin: 1em 0; }

  #preview table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 1em;
  }
  #preview th, #preview td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  #preview th { background: var(--surface); font-weight: 600; }

  #preview input[type="checkbox"] {
    accent-color: var(--accent);
    margin-right: 6px;
  }

  /* ── Status bar ── */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .statusbar .stats { display: flex; gap: 14px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Mobile ── */
  .view-toggle {
    display: none;
  }

  @media (max-width: 768px) {
    .divider { display: none; }
    .editor-pane, .preview-pane { flex: none; width: 100%; }
    .main { flex-direction: column; }
    .main.show-editor .editor-pane { display: flex; }
    .main.show-editor .preview-pane { display: none; }
    .main.show-preview .editor-pane { display: none; }
    .main.show-preview .preview-pane { display: flex; }
    .view-toggle { display: flex; }
    .filename-input { width: 120px; }
    .btn span.label { display: none; }
    header { padding: 6px 10px; }
  }

  /* ── Drag overlay ── */
  .drag-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 212, 170, 0.08);
    border: 3px dashed var(--accent);
    z-index: 50;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    pointer-events: none;
  }
  .drag-overlay.show { display: flex; }

  /* ── Empty state ── */
  .empty-hint {
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding-top: 60px;
    line-height: 1.8;
  }
  .empty-hint kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MD Pad</div>
  <input class="filename-input" id="filename" value="untitled.md" spellcheck="false" aria-label="File name">
  <div class="actions">
    <button class="btn view-toggle" id="btn-toggle" title="Toggle view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
    </button>
    <button class="btn" id="btn-upload" title="Upload .md file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span class="label">Upload</span>
    </button>
    <button class="btn primary" id="btn-download" title="Download .md file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="label">Download</span>
    </button>
    <input type="file" id="file-input" accept=".md,.markdown,.txt,.text">
  </div>
</header>

<div class="main show-editor" id="main">
  <div class="editor-pane">
    <div class="pane-header"><span class="dot"></span> Editor</div>
    <textarea id="editor" placeholder="Start writing markdown..." spellcheck="false" aria-label="Markdown editor"></textarea>
  </div>
  <div class="divider" id="divider"></div>
  <div class="preview-pane">
    <div class="pane-header"><span class="dot"></span> Preview</div>
    <div id="preview">
      <div class="empty-hint">
        Write some markdown in the editor<br>
        and see it rendered here in real time<br><br>
        Drop a <kbd>.md</kbd> file anywhere to open it
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <div class="stats">
    <span id="stat-words">0 words</span>
    <span id="stat-chars">0 chars</span>
    <span id="stat-lines">0 lines</span>
  </div>
  <div>
    <span id="stat-save"></span>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="drag-overlay" id="drag-overlay">Drop your .md file here</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script>
(function() {
  'use strict';

  // ── Elements ──
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const filenameInput = document.getElementById('filename');
  const fileInput = document.getElementById('file-input');
  const btnUpload = document.getElementById('btn-upload');
  const btnDownload = document.getElementById('btn-download');
  const btnToggle = document.getElementById('btn-toggle');
  const mainEl = document.getElementById('main');
  const divider = document.getElementById('divider');
  const toastEl = document.getElementById('toast');
  const dragOverlay = document.getElementById('drag-overlay');
  const statWords = document.getElementById('stat-words');
  const statChars = document.getElementById('stat-chars');
  const statLines = document.getElementById('stat-lines');
  const statSave = document.getElementById('stat-save');

  // ── State ──
  let mobileView = 'editor'; // editor | preview
  let lastSaved = '';

  // ── Marked config ──
  marked.setOptions({
    gfm: true,
    breaks: true
  });

  // ── Render ──
  function render() {
    const val = editor.value;
    if (!val.trim()) {
      preview.innerHTML = '<div class="empty-hint">Write some markdown in the editor<br>and see it rendered here in real time<br><br>Drop a <kbd>.md</kbd> file anywhere to open it</div>';
    } else {
      preview.innerHTML = marked.parse(val);
    }
    updateStats(val);
    autoSave(val);
  }

  function updateStats(val) {
    const text = val.trim();
    const words = text ? text.split(/\s+/).length : 0;
    const chars = val.length;
    const lines = val ? val.split('\n').length : 0;
    statWords.textContent = words + (words === 1 ? ' word' : ' words');
    statChars.textContent = chars + (chars === 1 ? ' char' : ' chars');
    statLines.textContent = lines + (lines === 1 ? ' line' : ' lines');
  }

  // ── Auto-save to localStorage ──
  let saveTimer;
  function autoSave(val) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem('mdpad-content', val);
        localStorage.setItem('mdpad-filename', filenameInput.value);
        const now = new Date();
        statSave.textContent = 'saved ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        lastSaved = val;
      } catch(e) {}
    }, 500);
  }

  // ── Load from localStorage ──
  function loadSaved() {
    const saved = localStorage.getItem('mdpad-content');
    const savedName = localStorage.getItem('mdpad-filename');
    if (saved !== null) {
      editor.value = saved;
      render();
    }
    if (savedName) filenameInput.value = savedName;
  }

  // ── Toast ──
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // ── Upload ──
  btnUpload.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readFile(file);
    fileInput.value = '';
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      editor.value = e.target.result;
      filenameInput.value = file.name;
      render();
      toast('Loaded ' + file.name);
    };
    reader.readAsText(file);
  }

  // ── Download ──
  btnDownload.addEventListener('click', () => {
    const val = editor.value;
    const name = filenameInput.value || 'untitled.md';
    const blob = new Blob([val], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name.endsWith('.md') ? name : name + '.md';
    a.click();
    URL.revokeObjectURL(url);
    toast('Downloaded ' + a.download);
  });

  // ── Mobile toggle ──
  btnToggle.addEventListener('click', () => {
    if (mobileView === 'editor') {
      mobileView = 'preview';
      mainEl.classList.remove('show-editor');
      mainEl.classList.add('show-preview');
      render();
    } else {
      mobileView = 'editor';
      mainEl.classList.remove('show-preview');
      mainEl.classList.add('show-editor');
    }
  });

  // ── Editor events ──
  editor.addEventListener('input', render);

  // Tab key inserts spaces
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      render();
    }
    // Ctrl/Cmd+S to download
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      btnDownload.click();
    }
  });

  // ── Drag & Drop ──
  let dragCounter = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    dragOverlay.classList.add('show');
  });
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      dragOverlay.classList.remove('show');
    }
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    dragOverlay.classList.remove('show');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  // ── Divider resize ──
  let isDragging = false;
  divider.addEventListener('mousedown', (e) => {
    isDragging = true;
    divider.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const container = mainEl;
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = (x / rect.width) * 100;
    const clamped = Math.max(20, Math.min(80, pct));
    const editorPane = container.querySelector('.editor-pane');
    const previewPane = container.querySelector('.preview-pane');
    editorPane.style.flex = 'none';
    editorPane.style.width = clamped + '%';
    previewPane.style.flex = 'none';
    previewPane.style.width = (100 - clamped) + '%';
  });
  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // ── Keyboard shortcuts hint ──
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
      e.preventDefault();
      fileInput.click();
    }
  });

  // ── Init ──
  loadSaved();
  if (!editor.value) render();

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
